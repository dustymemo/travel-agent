name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · test · lint · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Order mirrors the local pre-push flow. Each step gates the build.
      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      # Enforces the coverage gate (90% lines/stmts, 80% branches on src/lib/).
      - name: Test + coverage
        run: npm run test:coverage

      # NOTE: never runs the real `claude` CLI — tests use FakeProvider and the
      # build needs no AI provider. Do not add TRAVEL_AI_PROVIDER=claude-cli here.
      - name: Build
        run: npm run build
        env:
          # Public Supabase vars are read at build; dummy values keep the
          # standalone build deterministic without real secrets.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
